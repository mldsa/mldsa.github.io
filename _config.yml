title: "From LeetCode to Learning Systems"
description: "A dual-view interview guide for Algorithms, ML, LLMs, Agents, and Systems"
author: "Deb Paul"
github_username: mldsa
url: "https://mldsa.github.io"
baseurl: ""

# Theme
remote_theme: just-the-docs/just-the-docs@v0.10.0

# Color scheme: light (clean like aman.ai) or dark
color_scheme: light

# Search
search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s\-/]+/
  rel_url: true
  button: false

# Navigation
nav_sort: order
nav_external_links:
  - title: GitHub
    url: https://github.com/mldsa/learning-systems-from-scratch
  - title: LinkedIn
    url: https://linkedin.com/in/dpaul0501

# Footer
footer_content: "© 2026 Deb Paul. Built with Jekyll & Just the Docs."

# Callouts (for tips, warnings, notes in chapters)
callouts_level: quiet
callouts:
  highlight:
    color: yellow
  important:
    title: Important
    color: blue
  new:
    title: New
    color: green
  note:
    title: Note
    color: purple
  warning:
    title: Warning
    color: red

# Aux links (top right nav)
aux_links:
  "⭐ Star on GitHub":
    - "https://github.com/mldsa/learning-systems-from-scratch"

aux_links_new_tab: true

# Heading anchor links
heading_anchors: true

# Back to top button
back_to_top: true
back_to_top_text: "Back to top"

# Last edit timestamp
last_edit_timestamp: true
last_edit_time_format: "%b %e %Y at %I:%M %p"

# Markdown engine
markdown: kramdown
highlighter: rouge
kramdown:
  syntax_highlighter_opts:
    block:
      line_numbers: false

# Permalinks
permalink: pretty

# Plugins
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap

# Exclude from build
exclude:
  - "*.sh"
  - "Gemfile"
  - "Gemfile.lock"
  - "node_modules"
  - "vendor"
  - ".git"
  - "README_DEV.md"
